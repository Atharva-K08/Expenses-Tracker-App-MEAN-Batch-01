<div class="card border-0 p-2 h-100">
  <form class="d-flex justify-content-center flex-column h-100 align-items-center d-flex">
    <h3 class="text-center">Sign In</h3>
    <p class="text-center w-75">Welcome there! Sign to continue with FinSet.</p>
    <div class="w-75">
      <label>Email</label>
      <input
        type="email"
        class="form-control mb-3 mt-2 border-secondary"
        style="border-radius: 20px; font-size: 14px; padding: 10px 14px"
        placeholder="Enter your email"
      />
    </div>
    <div class="w-75">
      <label>Password</label>
      <input
        type="password"
        class="form-control mb-3 mt-2 border-secondary"
        style="border-radius: 20px; font-size: 14px; padding: 10px 14px"
        placeholder="Enter your password"
      />
    </div>
    <div class="w-75 d-flex justify-content-between align-items-center">
      <span class="d-flex gap-2">
        <input type="checkbox" class="form-check" />
        <label style="font-size: 14px">Keep me logged in</label>
      </span>
      <a routerLink="/forget-password" class="text-decoration-none" style="font-size: 14px"> Forgot password? </a>
    </div>
    <div class="w-75">
      <button
        class="btn btn-primary w-100 mt-5"
        style="border-radius: 20px; font-size: 14px; padding: 10px 14px"
      >
        Sign In
      </button>
    </div>
    <div id="continue-with" class="w-75 d-flex flex-column align-items-center mt-4">
      <div class="d-flex w-100 justify-content-center align-items-center gap-3 mb-3">
        <div class="border border-1" style="width: 30%; height: 0px"></div>
        <span style="font-size: 14px">or continue with</span>
        <div class="border border-1" style="width: 30%; height: 0px"></div>
      </div>
      <div class="d-flex gap-3">
        <button
          class="btn btn-light border-secondary"
          style="border-radius: 30px; font-size: 14px; padding: 14px"
        >
          <img width="20" src="/assets/images/google-logo.png" alt="Google" />
        </button>
        <button
          class="btn btn-light border-secondary"
          style="border-radius: 30px; font-size: 14px; padding: 14px"
        >
          <img width="20" src="/assets/images/apple-logo.png" alt="Apple" />
        </button>
      </div>
      <div class="w-75">
        <p class="text-center mt-3" style="font-size: 14px">
          Don't have an account?
          <a routerLink="/register" class="text-decoration-none" style="cursor: pointer;"> Sign Up </a>
        </p>
      </div>
    </div>
  </form>
</div>
