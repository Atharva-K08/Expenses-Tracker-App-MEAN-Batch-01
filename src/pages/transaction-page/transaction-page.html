<!-- Modal -->
<div
  class="modal fade"
  style="top: 100px"
  id="transcation-form"
  tabindex="-1"
  aria-labelledby="exampleModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog rounded-5">
    <div class="modal-content rounded-5">
      <div class="modal-header">
        <div class="w-100">
          <h1 class="modal-title fs-5 text-center" id="exampleModalLabel">
            Adding a new Transcation
          </h1>
          <div class="text-center">please fill the form below</div>
        </div>
        <button
          type="button"
          class="btn-close position-absolute"
          style="right: 22px"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <form
          [formGroup]="transactionForm"
          (ngSubmit)="submitTransaction()"
          class="w-100 p-1 d-flex flex-column gap-3"
        >
          <div class="row">
            <div class="col-4">
              <label class="form-label">Type</label>
              <select formControlName="type" type="text" class="form-select rounded-5 p-2 px-3">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label">Currency</label>
              <select formControlName="currency" type="text" class="form-select rounded-5 p-2 px-3">
                <option value="INR">INR</option>
                <option value="USD">USD</option>
                <option value="IQD">IQD</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label">Amount</label>
              <input
                formControlName="amount"
                type="text"
                class="form-control rounded-5 p-2 px-3"
                placeholder="1000 Rs"
              />
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <label class="form-label">Name</label>
              <input
                formControlName="description"
                type="text"
                class="form-control rounded-5 p-2 px-3"
                placeholder="Name of Transcation"
              />
            </div>
          </div>
          <div class="row">
            <div class="col-5">
              <label class="form-label">Method</label>
              <select formControlName="method" type="text" class="form-select rounded-5 p-2 px-3">
                <option value="cash">Cash</option>
                <option value="card">Card</option>
                <option value="online">Online</option>
                <option value="check">Check</option>
                <option value="bank transfer">Bank Transfer</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Category</label>
              <select formControlName="category" type="text" class="form-select rounded-5 p-2 px-3">
                @for (category of categories; track $index) {
                  <option [value]="category._id">{{ category.name }}</option>
                }
              </select>
            </div>
            <div class="col-1 p-0 d-flex justify-content-center align-items-end">
              <div
                class="card rounded-5"
                style="padding: 7px 10px"
                data-bs-toggle="modal"
                data-bs-target="#transcation-category-form"
              >
                <i class="ri-add-line"></i>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-1 p-0 d-flex flex-column justify-content-center align-items-end">
              <label class="form-label">Date</label>
              <div class="card rounded-5" style="padding: 7px 10px">
                <i class="ri-calendar-line"></i>
              </div>
            </div>
            <div class="col-5 d-flex align-items-end">
              <input formControlName="date" type="date" class="form-control rounded-5 p-2 px-3" />
            </div>
            <div class="col-6">
              <label class="form-label">Status</label>
              <select formControlName="status" type="text" class="form-select rounded-5 p-2 px-3">
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-6">
              <button
                class="btn btn-outline-secondary rounded-5 py-2 w-100"
                data-bs-dismiss="modal"
                aria-label="Close"
              >
                Cancel
              </button>
            </div>
            <div class="col-6">
              <button
                class="btn btn-outline-light theme-primary-bg rounded-5 py-2 w-100"
                data-bs-toggle="modal"
                data-bs-target="#transcation-form"
                type="submit"
              >
                Save
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<!-- ------------------- -->
<!-- Modal -->
<div
  class="modal fade"
  style="top: 100px"
  id="transcation-category-form"
  tabindex="-1"
  aria-labelledby="exampleModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div class="w-100">
          <h1 class="modal-title fs-5 text-center" id="exampleModalLabel">Adding a new Category</h1>
          <div class="text-center">please fill the form below</div>
        </div>
        <button
          type="button"
          class="btn-close position-absolute"
          style="right: 22px"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="categoryForm" (ngSubmit)="submitCategory()" class="w-100 p-1">
          <div class="row">
            <div class="col-12">
              <label class="form-label">Name</label>
              <input
                type="text"
                formControlName="name"
                class="form-control rounded-5 p-2 px-3 mb-3"
                placeholder="Name of Category"
              />
              <button type="submit" class="btn btn-outline-light theme-primary-bg rounded-5 py-2">
                Add
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<!-- -------------------------------- -->
<div id="transcations" class="p-3">
  <!-- ------------------------------- -->
  <div class="d-flex justify-content-end gap-2">
    <button class="btn btn-outline-dark rounded-5 py-2 border-secondary">
      <i class="ri-file-line"></i> Export CSV
    </button>
    <button
      class="btn btn-outline-light theme-primary-bg rounded-5 py-2"
      data-bs-toggle="modal"
      data-bs-target="#transcation-form"
    >
      <i class="ri-add-line"></i> Add New
    </button>
  </div>
  <!-- ------------------------------- -->
</div>
