<div class="layout container-fluid" style="height: 100vh">
  <div class="row h-100">
    <div class="col-2 p-0 theme-secondary-bg h-100 d-flex flex-column">
      <div>
        <div class="card-body px-2 pt-2 pe-4 me-5">
          <img class="m-2 img-fluid" src="/assets/images/finset-logo.png" alt="" />
        </div>
      </div>
      <div class="d-flex flex-column h-100 justify-content-between">
        <div class="d-flex flex-column p-2 gap-1">
          @for (item of navItems; track $index) {
            <button
              [ngClass]="{ 'theme-primary-bg text-white': item.isActive }"
              (click)="clickHandler($index)"
              class="btn-lg btn text-start ps-4 bg-transparent rounded-5 fs-6"
              style="padding: 12px"
            >
              <i class="{{ item.icon }}"> </i>
              {{ item.placeholder }}
            </button>
          }
        </div>
        <div class="d-flex flex-column align-items-start p-3">
          <button class="btn w-100 text-start rounded-5 ps-4">
            <i class="ri-question-line"></i> Help
          </button>
          <button class="btn w-100 text-start rounded-5 ps-4">
            <i class="ri-logout-box-line"></i> Logout
          </button>
        </div>
      </div>
    </div>
    <div class="col-10 p-0">
      <div class="d-flex align-items-center py-2 px-3 justify-content-between" style="height: 65px">
        <!-- -------------------- -->
        <div>
          <div class="h5 m-0">Transcations</div>
          <div class="text-secondary" style="font-size: 11px;">Overview of your activies</div>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <div class="card rounded-5" style="padding: 8px 12px"><i class="ri-search-line"></i></div>
          <div class="card rounded-5" style="padding: 8px 12px">
            <i class="ri-notification-line"></i>
          </div>
          <div class="card flex-row rounded-5 p-1">
            <div class="rounded-5" >
              <img
                style="height: 35px; width: 35px"
                class="img-fluid rounded-circle border border-1 border-black"
                src="https://i.pinimg.com/1200x/97/fa/76/97fa76ccec00f086be12adad535ebd72.jpg"
                alt=""
              />
            </div>
            <div class="d-flex flex-column px-2 justify-content-center" >
              <div class="fw-bold" style="font-size: 12px;">Atharva Sir</div>
              <div style="font-size: 10px;">example@email.com</div>
            </div>
          </div>
        </div>
        <!-- -------------------- -->
      </div>
      <div style="min-height: calc(100vh - 80px); outline: 1px solid black;">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
